spring:
  application:
    name: extractor-api

  # Jackson
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8081
  servlet:
    context-path: /

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Extractor configuration
extractor:
  repos: []        # Populated via EXTRACTOR_REPOS_CONFIG file or overridden per environment
  git:
    ssh-key-path: ${EXTRACTOR_GIT_SSH_KEY_PATH:}
    clone-on-startup: true
  graph:
    batch-size: 100
  ingestion:
    cron: "0 0 2 * * *"   # 2am daily

# Logging
logging:
  level:
    com.extractor: DEBUG
