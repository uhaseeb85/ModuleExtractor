services:

  neo4j:
    image: neo4j:5-community
    container_name: extractor-neo4j
    environment:
      NEO4J_AUTH: neo4j/extractor123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - extractor-net

  extractor-api:
    image: extractor-api:latest
    build:
      context: .
      dockerfile: extractor-api/Dockerfile
    container_name: extractor-api
    environment:
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: extractor123

      # ── Add your repositories here ────────────────────────────────────────
      # Each repo needs a sequential index (0, 1, 2, …).
      # buildTool must be MAVEN or GRADLE.
      # localPath is where the repo will be cloned INSIDE the container.
      # Mount a host directory to /repos if you want clones to persist.
      #
      # Example — two repos:
      #
      # EXTRACTOR_REPOS_0_NAME: my-monolith
      # EXTRACTOR_REPOS_0_URL: https://github.com/org/my-monolith.git
      # EXTRACTOR_REPOS_0_BRANCH: main
      # EXTRACTOR_REPOS_0_BUILDTOOL: MAVEN
      # EXTRACTOR_REPOS_0_LOCALPATH: /repos/my-monolith
      #
      # EXTRACTOR_REPOS_1_NAME: payment-service
      # EXTRACTOR_REPOS_1_URL: https://github.com/org/payment-service.git
      # EXTRACTOR_REPOS_1_BRANCH: main
      # EXTRACTOR_REPOS_1_BUILDTOOL: GRADLE
      # EXTRACTOR_REPOS_1_LOCALPATH: /repos/payment-service
      #
      # For SSH repos, also set:
      # EXTRACTOR_GIT_SSHKEYPATH: /root/.ssh/id_rsa
      # and mount your key: - ~/.ssh/id_rsa:/root/.ssh/id_rsa:ro
      # ─────────────────────────────────────────────────────────────────────

      EXTRACTOR_GIT_CLONEONSTARTUP: "true"
    ports:
      - "8081:8080"
    volumes:
      - repo_clones:/repos
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - extractor-net

  extractor-frontend:
    image: extractor-frontend:latest
    build:
      context: extractor-frontend
      dockerfile: Dockerfile
    container_name: extractor-frontend
    ports:
      - "5173:80"
    depends_on:
      - extractor-api
    networks:
      - extractor-net

volumes:
  neo4j_data:
  neo4j_logs:
  repo_clones:

networks:
  extractor-net:
    driver: bridge
